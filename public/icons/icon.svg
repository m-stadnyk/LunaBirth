<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#0F1840"/>
      <stop offset="100%" stop-color="#050B18"/>
    </radialGradient>
    <radialGradient id="moon" cx="35%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#B8892A"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D4A843" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#D4A843" stop-opacity="0"/>
    </radialGradient>
    <mask id="crescent">
      <circle cx="256" cy="225" r="138" fill="white"/>
      <circle cx="302" cy="225" r="108" fill="black"/>
    </mask>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)" rx="0"/>

  <!-- Moon glow -->
  <ellipse cx="240" cy="225" rx="160" ry="155" fill="url(#glow)" opacity="0.7"/>

  <!-- Crescent moon -->
  <circle cx="256" cy="225" r="138" fill="url(#moon)" mask="url(#crescent)"/>

  <!-- Stars -->
  <circle cx="378" cy="87"  r="7"  fill="#C8DCEF" opacity="0.90"/>
  <circle cx="123" cy="123" r="5"  fill="#C8DCEF" opacity="0.75"/>
  <circle cx="410" cy="256" r="5"  fill="#C8DCEF" opacity="0.75"/>
  <circle cx="82"  cy="297" r="4"  fill="#C8DCEF" opacity="0.65"/>
  <circle cx="328" cy="384" r="7"  fill="#C8DCEF" opacity="0.85"/>
  <circle cx="164" cy="379" r="4"  fill="#C8DCEF" opacity="0.65"/>
  <circle cx="435" cy="154" r="4"  fill="#C8DCEF" opacity="0.60"/>
  <circle cx="282" cy="440" r="5"  fill="#C8DCEF" opacity="0.70"/>
</svg>
